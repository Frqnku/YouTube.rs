name: Build, Test and Deploy Leptos SSR App

on:
  # push:
  #   branches:
  #     - master
  # 👆 Uncomment to trigger auto when push on master

  # 🖥️ gh workflow run prod.yml
  # 🖥️ gh workflow run prod.yml -f skip_build=true   ← redeploy only, no rebuild
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build and redeploy current :latest image'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  # quality:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Check typos
  #       uses: crate-ci/typos@master

  build:
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_build != 'true'
    outputs:
      image_tag: ${{ steps.tag.outputs.sha }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Generate image tag
      id: tag
      run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/${{ vars.DOCKER_REPOSITORY }}:${{ steps.tag.outputs.sha }}
          ${{ secrets.DOCKER_USERNAME }}/${{ vars.DOCKER_REPOSITORY }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: [build]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest

    env:
      SSH: ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ vars.SERVER_IP }}
      SCP: scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ vars.SERVER_IP }} >> ~/.ssh/known_hosts

    - name: Copy configs to server
      run: |
        ${{ env.SCP }} docker-compose.yml root@${{ vars.SERVER_IP }}:~
        ${{ env.SCP }} nginx.conf root@${{ vars.SERVER_IP }}:~

    - name: Generate SSL certs on server (if not present)
      run: |
        ${{ env.SSH }} "
          mkdir -p ~/ssl
          if [ ! -f ~/ssl/nginx-selfsigned.crt ]; then
            openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
              -keyout ~/ssl/nginx-selfsigned.key \
              -out ~/ssl/nginx-selfsigned.crt \
              -subj '/CN=${{ vars.DOMAIN }}'
            echo 'SSL certs generated'
          else
            echo 'SSL certs already exist'
          fi
        "

    - name: Docker login on server
      run: |
        ${{ env.SSH }} "echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin"

    - name: Set IMAGE_TAG on server
      run: |
        TAG="${{ needs.build.outputs.image_tag || 'latest' }}"
        ${{ env.SSH }} "sed -i '/^IMAGE_TAG=/d' ~/.env && echo 'IMAGE_TAG=$TAG' >> ~/.env"

    - name: Start DB and sync password before app boots
      # POSTGRES_PASSWORD is only read on first DB init (empty volume).
      # Syncing here — after DB is healthy but before app starts — avoids the crash loop.
      run: |
        ${{ env.SSH }} "
          cd ~
          docker compose down
          docker compose pull
          docker compose up -d db
          until docker exec root-db-1 pg_isready -U postgres; do sleep 2; done
          PG_USER=\$(grep '^POSTGRES_USER=' ~/.env | cut -d= -f2-)
          PG_PASS=\$(grep '^POSTGRES_PASSWORD=' ~/.env | cut -d= -f2-)
          docker exec root-db-1 psql -U postgres -c \"ALTER USER \$PG_USER WITH PASSWORD '\$PG_PASS';\"
        "

    - name: Deploy app and nginx
      run: |
        ${{ env.SSH }} "
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          export DOCKER_REPOSITORY=${{ vars.DOCKER_REPOSITORY }}
          export IMAGE_TAG=${{ needs.build.outputs.image_tag || 'latest' }}
          cd ~
          docker compose up -d
        "

    - name: Smoke test
      run: |
        sleep 5
        ${{ env.SSH }} "curl -sf http://localhost/health || (docker compose logs app --tail=20 && exit 1)"

    - name: Cleanup old Docker images
      # Each deploy pulls a new image tag — old tags accumulate and fill the disk.
      # Runs after smoke test so the new image is "in use" and won't be pruned.
      run: |
        ${{ env.SSH }} "docker image prune -af"
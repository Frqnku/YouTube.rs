events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log;

    sendfile        on;
    keepalive_timeout 65;


    # ── HTTP (port 80) ───────────────────────────────────────────────────────
    server {
        listen      80;
        server_name ${DOMAIN} www.${DOMAIN};

        location / {
            proxy_pass http://app:3000;                                        # ➡️ Docker service name

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;                  # 🌐 Client's real IP
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;                       # 🔒 HTTP/HTTPS info
            proxy_set_header X-Forwarded-Host  $server_name;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;

            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }


    # ── HTTPS (port 443) ─────────────────────────────────────────────────────
    server {
        listen      443 ssl;
        server_name ${DOMAIN} www.${DOMAIN};

        # Self-signed cert — Cloudflare terminates public SSL (mode: Full)
        ssl_certificate     /etc/nginx/ssl/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://app:3000;                                        # ➡️ Docker service name

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;                  # 🌐 Client's real IP
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;                       # 🔒 HTTP/HTTPS info
            proxy_set_header X-Forwarded-Host  $server_name;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;

            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}